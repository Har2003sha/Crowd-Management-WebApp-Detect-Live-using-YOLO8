<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Crowd Management</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Poppins", Arial, sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #141e30, #243b55);
            overflow: hidden;
        }

        /* Animated Background */
        body::before {
            content: "";
            position: absolute;
            width: 600px;
            height: 600px;
            background: rgba(0, 255, 255, 0.15);
            border-radius: 50%;
            top: -200px;
            left: -200px;
            animation: float 8s infinite alternate ease-in-out;
        }

        body::after {
            content: "";
            position: absolute;
            width: 500px;
            height: 500px;
            background: rgba(255, 0, 100, 0.12);
            border-radius: 50%;
            bottom: -180px;
            right: -180px;
            animation: float2 10s infinite alternate ease-in-out;
        }

        @keyframes float {
            0% { transform: translate(0,0); }
            100% { transform: translate(120px, 120px); }
        }

        @keyframes float2 {
            0% { transform: translate(0,0); }
            100% { transform: translate(-100px, -100px); }
        }

        /* Login Box */
        .login-container {
            width: 420px;
            padding: 35px;
            border-radius: 18px;
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0px 8px 30px rgba(0, 0, 0, 0.35);
            backdrop-filter: blur(18px);
            text-align: center;
            z-index: 2;
            animation: fadeIn 1.2s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0px);
            }
        }

        .login-container h2 {
            font-size: 26px;
            font-weight: 600;
            color: white;
            margin-bottom: 25px;
            letter-spacing: 1px;
        }

        /* Input fields */
        .input-box {
            position: relative;
            margin-bottom: 20px;
        }

        .input-box input {
            width: 100%;
            padding: 14px 14px 14px 45px;
            border: none;
            border-radius: 10px;
            outline: none;
            font-size: 15px;
            background: rgba(255, 255, 255, 0.12);
            color: white;
            transition: 0.3s;
        }

        .input-box input::placeholder {
            color: rgba(255, 255, 255, 0.7);
        }

        .input-box input:focus {
            background: rgba(255, 255, 255, 0.18);
            box-shadow: 0px 0px 10px rgba(0, 255, 255, 0.4);
        }

        /* Icons */
        .input-box span {
            position: absolute;
            top: 50%;
            left: 15px;
            transform: translateY(-50%);
            font-size: 18px;
            color: rgba(255, 255, 255, 0.75);
        }

        /* Button */
        button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            color: white;
            background: linear-gradient(135deg, #00c6ff, #0072ff);
            transition: 0.4s;
            letter-spacing: 1px;
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0px 8px 25px rgba(0, 198, 255, 0.5);
        }

        button:active {
            transform: scale(0.97);
        }

        /* Footer Text */
        .footer-text {
            margin-top: 20px;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.7);
        }

        .footer-text a {
            color: #00c6ff;
            text-decoration: none;
            font-weight: 500;
        }

        .footer-text a:hover {
            text-decoration: underline;
        }

    </style>
</head>

<body>

    <div class="login-container">
        <h2>🚦 Crowd Management Login</h2>

        <form action="/login" method="post">

            <div class="input-box">
                <span>👤</span>
                <input type="text" name="username" placeholder="Enter Username" required>
            </div>

            <div class="input-box">
                <span>🔒</span>
                <input type="password" name="password" placeholder="Enter Password" required>
            </div>

            <button type="submit">LOGIN</button>

        </form>

        <div class="footer-text">
            AI Powered Dashboard | <a href="#">YOLOv8 + Flask</a>
        </div>
    </div>

</body>
</html>
